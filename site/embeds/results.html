<!--
  =====================================================================
  OneDash Marketing Site — Webflow Embed loader v3  (results)
  =====================================================================
  WHAT: Paste this ONCE into a Webflow "Embed" element on the results
        page. It never needs to change again. CSS + content load from
        GitHub raw (live within 5 min of a push, no cache purging);
        images/PDF load from jsDelivr, which is also the fallback if
        GitHub raw is unreachable. CSS is applied BEFORE content is
        injected, so the page never renders unstyled.
  =====================================================================
-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<div id="od-root" class="od-embed"></div>

<script>
  (function () {
    var PAGE = "results";
    // ── Branch toggle — comment/uncomment the active block, then publish ──
    // MAIN (production — live for real visitors). ACTIVE by default:
    var RAW = "https://raw.githubusercontent.com/samrezonedash/onedashengine-user-guide-assets/main/site/assets/";
    var CDN = "https://cdn.jsdelivr.net/gh/samrezonedash/onedashengine-user-guide-assets@main/site/assets/";
    // PRELIVE (testing). To preview WIP changes: comment out the two MAIN
    // lines above, uncomment these two, then publish (to this page only,
    // or the whole site — either is fine, this only affects this page):
    // var RAW = "https://raw.githubusercontent.com/samrezonedash/onedashengine-user-guide-assets/prelive/site/assets/";
    // var CDN = "https://cdn.jsdelivr.net/gh/samrezonedash/onedashengine-user-guide-assets@prelive/site/assets/";
    var root = document.getElementById('od-root');

    function fetchText(path) {
      return fetch(RAW + path).then(function (r) {
        if (!r.ok) throw new Error('raw ' + r.status);
        return r.text();
      }).catch(function () {
        return fetch(CDN + path).then(function (r) { return r.text(); });
      });
    }

    Promise.all([fetchText('marketing.css'), fetchText('content/' + PAGE + '.html')])
      .then(function (results) {
        // CSS first — content must never render with only Webflow's own
        // site-wide stylesheet (its bare p/li/h1/.container rules produce
        // the centered/column-broken layout this loader exists to avoid).
        var style = document.createElement('style');
        style.textContent = results[0];
        document.head.appendChild(style);

        root.innerHTML = results[1];
        root.querySelectorAll('[data-od]').forEach(function (el) { el.src = CDN + el.getAttribute('data-od'); });
        root.querySelectorAll('[data-od-href]').forEach(function (el) { el.href = CDN + el.getAttribute('data-od-href'); });

        if (PAGE === 'home') {
          var tabs = [].slice.call(root.querySelectorAll('.ptab'));
          var map = {'tab-quality':'panel-quality','tab-pharmacy':'panel-pharmacy','tab-finance':'panel-finance'};
          function act(t) {
            tabs.forEach(function (x) {
              var on = x === t;
              x.classList.toggle('is-active', on);
              x.setAttribute('aria-selected', on ? 'true' : 'false');
              var p = root.querySelector('#' + map[x.id]);
              if (p) { p.classList.toggle('is-active', on); if (on) { p.removeAttribute('hidden'); } else { p.setAttribute('hidden', ''); } }
            });
          }
          tabs.forEach(function (t) { t.addEventListener('click', function () { act(t); }); });
        }

        // Content landed async, so a #hash from a cross-page link missed
        // the browser's one-shot scroll-on-load; do it once content exists.
        if (window.location.hash) {
          var hashTarget = root.querySelector(window.location.hash);
          if (hashTarget) { hashTarget.scrollIntoView(); }
        }
      });
  })();
</script>
